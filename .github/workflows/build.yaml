name: Build 
on:
  workflow_dispatch:
      inputs:
        release_tag:
          description: "Enter the version (eg: v1.0.0)"
          required: true
env:
  IMAGE_NAME: skillexchange 
jobs:
  build:
    name: build and analyse 
    runs-on: ubuntu-latest 
    permissions:
      contents: read
      packages: write  
    steps:
      - uses: actions/checkout@v4 
        with: 
          fetch-depth: 0  
      - uses: SonarSource/sonarqube-scan-action@v6 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}  
      - name: sonar quality gate 
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} 
        timeout-minutes: 5  
      - name: snyk
        uses: snyk/actions/node@master 
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor 
          args: --file=package.json 
      
      
      - name: Login GHCR
        run: echo ${{secrets.TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin
 
      - name: Convert repo to lowercase
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
     
      - name: Build Image
        run: docker build -t ghcr.io/${{ env.REPO_LC }}/${{env.IMAGE_NAME}}:${{inputs.release_tag}} .
 
      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ env.REPO_LC }}/${{env.IMAGE_NAME}}:${{inputs.release_tag}}

      - name: Build Image
        run: docker build -t  ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:${{inputs.release_tag}} .
     
      - name: Dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
 
      - name: Push to Hub
        run: docker push ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:${{inputs.release_tag}}
    
 

      - name: send success email 
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "BUILD SUCCESS"
          body: "quality gate success"
          from: GitHub Actions
          to: ${{ secrets.EMAIL_USERNAME }} 
      - name: send failure email 
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "BUILD FAILED"
          body: "quality gate FAILED"
          from: GitHub Actions
          to: ${{ secrets.EMAIL_USERNAME }} 


 

 
 

 
      